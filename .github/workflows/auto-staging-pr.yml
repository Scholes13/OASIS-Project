name: auto-staging-pr

on:
  push:
    branches:
      - staging

permissions:
  contents: write
  pull-requests: write

jobs:
  open-pr:
    name: Open staging to main PR
    runs-on: ubuntu-latest

    steps:
      - name: Create or update staging PR
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          compare_json="$(gh api "repos/$REPO/compare/main...staging")"

          body_file="$(mktemp)"
          cat > "$body_file" <<'BODY'
          Release PR from `staging` to `main`.

          This PR is intentionally manual.

          UAT flow:
          - Validate the staging deployment first.
          - Confirm the changes are approved by the requester/user.
          - Merge this PR only when the release is approved for production.

          Production deploy runs automatically after this PR is merged to `main`.
          BODY
          {
            echo
            echo "## Commits included"
            echo "$compare_json" | jq -r '
              if (.commits | length) == 0 then
                "- No commits are currently pending between `staging` and `main`."
              else
                .commits[]
                | "- `" + (.sha[0:8]) + "` " + (.commit.message | split("\n")[0])
              end
            '
            echo
            echo "## Files changed"
            echo "$compare_json" | jq -r '
              if (.files | length) == 0 then
                "- No file changes are currently pending."
              else
                .files[]
                | "- `" + .filename + "` (" + .status + ")"
              end
            '
          } >> "$body_file"

          existing_pr="$(
            gh pr list \
              --repo "$REPO" \
              --base main \
              --head staging \
              --state open \
              --json number \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --repo "$REPO" \
              --title "Release: staging to main" \
              --body-file "$body_file"
            echo "Updated PR #$existing_pr"
            pr_number="$existing_pr"
          else
            if ! pr_url="$(
              gh pr create \
                --repo "$REPO" \
                --base main \
                --head staging \
                --title "Release: staging to main" \
                --body-file "$body_file"
            )"; then
              echo "No PR created. This usually means staging has no changes compared with main."
              exit 0
            fi

            pr_number="$(gh pr view "$pr_url" --repo "$REPO" --json number --jq '.number')"
            echo "Created PR #$pr_number"
          fi

          echo "PR #$pr_number is ready for manual UAT approval. Auto-merge is intentionally disabled."
