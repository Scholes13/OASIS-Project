name: deploy-cpanel

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: Branch to deploy
        required: true
        default: main
        type: string
      run_migrations:
        description: Run production migrations
        required: true
        default: true
        type: boolean
      backup_database:
        description: Backup database before migrations
        required: true
        default: true
        type: boolean

jobs:
  build:
    name: Build Laravel release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.branch || github.ref_name }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, curl, dom, fileinfo, gd, intl, mbstring, mysqli, pdo_mysql, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Prepare Laravel writable directories
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/cache storage/framework/sessions storage/framework/testing storage/framework/views storage/logs

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --no-progress --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare release archive
        run: |
          set -euo pipefail
          mkdir -p build/release
          rsync -a --delete ./ build/release/ \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.env' \
            --exclude='.env.*' \
            --exclude='node_modules' \
            --exclude='test-results' \
            --exclude='tmp' \
            --exclude='storage/app/*' \
            --exclude='storage/framework/cache/*' \
            --exclude='storage/framework/sessions/*' \
            --exclude='storage/framework/testing/*' \
            --exclude='storage/framework/views/*' \
            --exclude='storage/logs/*'
          tar -czf release.tar.gz -C build/release .

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpanel-release
          path: release.tar.gz
          retention-days: 3

  deploy:
    name: Deploy to cPanel
    runs-on: ubuntu-latest
    needs: build
    concurrency:
      group: cpanel-production-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: https://oasis.werkudara.com

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: cpanel-release

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          port: ${{ secrets.CPANEL_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          script: |
            set -e
            APP_PATH="${{ secrets.CPANEL_APP_PATH }}"
            mkdir -p "$APP_PATH/deploy" "$APP_PATH/releases" "$APP_PATH/shared" "$APP_PATH/backups"

      - name: Upload release archive
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          port: ${{ secrets.CPANEL_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          source: release.tar.gz
          target: ${{ secrets.CPANEL_APP_PATH }}/deploy
          overwrite: true

      - name: Activate release
        uses: appleboy/ssh-action@v1.2.2
        env:
          CPANEL_ENV_B64: ${{ secrets.CPANEL_ENV_B64 }}
          RUN_MIGRATIONS: ${{ inputs.run_migrations }}
          BACKUP_DATABASE: ${{ inputs.backup_database }}
        with:
          host: ${{ secrets.CPANEL_HOST }}
          username: ${{ secrets.CPANEL_USERNAME }}
          port: ${{ secrets.CPANEL_PORT }}
          key: ${{ secrets.CPANEL_SSH_KEY }}
          passphrase: ${{ secrets.CPANEL_SSH_PASSPHRASE }}
          password: ${{ secrets.CPANEL_SSH_PASSWORD }}
          envs: CPANEL_ENV_B64,RUN_MIGRATIONS,BACKUP_DATABASE
          script: |
            set -e

            APP_PATH="${{ secrets.CPANEL_APP_PATH }}"
            PHP_BIN="${{ secrets.CPANEL_PHP_BIN }}"
            if [ -z "$PHP_BIN" ]; then
              PHP_BIN="php"
            fi

            RELEASE_ID="${{ github.sha }}-${{ github.run_number }}"
            RELEASE_PATH="$APP_PATH/releases/$RELEASE_ID"
            SHARED_PATH="$APP_PATH/shared"
            PREVIOUS_RELEASE=""

            if [ -L "$APP_PATH/current" ]; then
              PREVIOUS_RELEASE="$(readlink "$APP_PATH/current" || true)"
            fi

            rollback() {
              EXIT_CODE=$?
              if [ "$EXIT_CODE" -ne 0 ] && [ -n "$PREVIOUS_RELEASE" ] && [ -d "$PREVIOUS_RELEASE" ]; then
                echo "Deploy failed. Rolling back current symlink to $PREVIOUS_RELEASE"
                ln -sfn "$PREVIOUS_RELEASE" "$APP_PATH/current"
                cd "$APP_PATH/current"
                "$PHP_BIN" artisan optimize:clear || true
                "$PHP_BIN" artisan config:cache || true
                "$PHP_BIN" artisan route:cache || true
                "$PHP_BIN" artisan view:cache || true
              fi
              exit "$EXIT_CODE"
            }
            trap rollback EXIT

            mkdir -p "$RELEASE_PATH"
            tar -xzf "$APP_PATH/deploy/release.tar.gz" -C "$RELEASE_PATH"

            mkdir -p \
              "$SHARED_PATH/storage/app/public" \
              "$SHARED_PATH/storage/framework/cache" \
              "$SHARED_PATH/storage/framework/sessions" \
              "$SHARED_PATH/storage/framework/testing" \
              "$SHARED_PATH/storage/framework/views" \
              "$SHARED_PATH/storage/logs" \
              "$SHARED_PATH/bootstrap-cache" \
              "$APP_PATH/backups"

            rm -rf "$RELEASE_PATH/storage"
            ln -sfn "$SHARED_PATH/storage" "$RELEASE_PATH/storage"

            rm -rf "$RELEASE_PATH/bootstrap/cache"
            ln -sfn "$SHARED_PATH/bootstrap-cache" "$RELEASE_PATH/bootstrap/cache"

            if [ -n "${CPANEL_ENV_B64:-}" ]; then
              printf '%s' "$CPANEL_ENV_B64" | base64 -d > "$SHARED_PATH/.env"
              chmod 600 "$SHARED_PATH/.env"
            fi

            if [ ! -f "$SHARED_PATH/.env" ]; then
              echo "Missing $SHARED_PATH/.env. Add CPANEL_ENV_B64 secret or create .env manually on the server."
              exit 1
            fi

            ln -sfn "$SHARED_PATH/.env" "$RELEASE_PATH/.env"

            cd "$RELEASE_PATH"
            "$PHP_BIN" artisan storage:link || true

            if [ "${BACKUP_DATABASE:-true}" = "true" ]; then
              DB_NAME="$("$PHP_BIN" -r '$env=parse_ini_file($argv[1], false, INI_SCANNER_RAW); echo $env["DB_DATABASE"] ?? "";' "$SHARED_PATH/.env")"
              DB_USER="$("$PHP_BIN" -r '$env=parse_ini_file($argv[1], false, INI_SCANNER_RAW); echo $env["DB_USERNAME"] ?? "";' "$SHARED_PATH/.env")"
              DB_PASS="$("$PHP_BIN" -r '$env=parse_ini_file($argv[1], false, INI_SCANNER_RAW); echo $env["DB_PASSWORD"] ?? "";' "$SHARED_PATH/.env")"
              DB_HOST="$("$PHP_BIN" -r '$env=parse_ini_file($argv[1], false, INI_SCANNER_RAW); echo $env["DB_HOST"] ?? "127.0.0.1";' "$SHARED_PATH/.env")"
              BACKUP_FILE="$APP_PATH/backups/${DB_NAME:-database}-$(date +%Y%m%d%H%M%S)-${{ github.run_number }}.sql.gz"

              if command -v mysqldump >/dev/null 2>&1; then
                MYSQL_PWD="$DB_PASS" mysqldump --single-transaction --quick --host="$DB_HOST" --user="$DB_USER" "$DB_NAME" | gzip > "$BACKUP_FILE"
                echo "Database backup created: $BACKUP_FILE"
                find "$APP_PATH/backups" -name '*.sql.gz' -type f -mtime +14 -delete
              else
                echo "mysqldump is required for production database backup."
                exit 1
              fi
            fi

            if [ "${RUN_MIGRATIONS:-true}" = "true" ]; then
              "$PHP_BIN" artisan migrate --force
            else
              echo "Skipping migrations because run_migrations=false"
            fi

            "$PHP_BIN" artisan optimize:clear
            "$PHP_BIN" artisan config:cache
            "$PHP_BIN" artisan route:cache
            "$PHP_BIN" artisan view:cache
            "$PHP_BIN" artisan queue:restart || true

            ln -sfn "$RELEASE_PATH" "$APP_PATH/current"

            HEALTH_URL="https://oasis.werkudara.com/api/v1/health"
            HTTP_CODE="$(curl -L -s -o /dev/null -w "%{http_code}" --max-time 20 "$HEALTH_URL" || echo "000")"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "Health check failed for $HEALTH_URL (HTTP $HTTP_CODE)."
              exit 1
            fi

            trap - EXIT

            find "$APP_PATH/releases" -mindepth 1 -maxdepth 1 -type d | sort -r | tail -n +6 | xargs -r rm -rf
            rm -f "$APP_PATH/deploy/release.tar.gz"

            echo "cPanel deploy complete: $RELEASE_ID"
