# docker-compose.yml
# Used for both production and staging (different .env per environment)

services:
  app:
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/numbering}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "php", "artisan", "--version"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network

  queue:
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/numbering}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --timeout=90
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  scheduler:
    image: ${DOCKER_IMAGE:-ghcr.io/your-org/numbering}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: php artisan schedule:work
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - app-storage:/var/www/html/storage/app
      - app-logs:/var/www/html/storage/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  chrome:
    image: browserless/chromium
    restart: unless-stopped
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=120000
      - TIMEOUT=120000
    networks:
      - app-network
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  app-storage:
  app-logs:
  redis-data:

networks:
  app-network:
    driver: bridge
