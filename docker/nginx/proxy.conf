# Nginx proxy config for STAGING only
# Add this as a new server block on the VPS
# Production (oasis.werkudara.com) continues using existing non-Docker setup
#
# Deploy to: /etc/nginx/sites-available/staging.oasis.werkudara.com

upstream staging_oasis {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    server_name staging.oasis.werkudara.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name staging.oasis.werkudara.com;

    ssl_certificate /etc/letsencrypt/live/staging.oasis.werkudara.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.oasis.werkudara.com/privkey.pem;

    client_max_body_size 50M;

    location / {
        proxy_pass http://staging_oasis;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
}
